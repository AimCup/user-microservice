eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_PRD}/eureka
server:
  servlet:
    context-path: /user
  port: 8501
spring:
  application:
    name: user-microservice
  datasource:
    url: jdbc:postgresql://${DB_PRD_ADDRESS}/user
    username: ${DB_PRD_USER}
    password: ${DB_PRD_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 10
      idle-timeout: 5000
      max-lifetime: 1000
      auto-commit: true
  flyway:
    locations: classpath:db/migration
    enabled: true
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        provider:
          aimcup:
            issuer-uri: ${PRD_KEYCLOAK_ISSUER_ID}
        registration:
          aimcup:
            provider: aimcup
            client-name: ${PRD_KEYCLOAK_CLIENT_NAME}
            client-id: ${PRD_KEYCLOAK_CLIENT_ID}
            client-secret: ${PRD_KEYCLOAK_CLIENT_SECRET}
            scope: profile,openid,offline_access
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
      resourceserver:
        jwt:
          jwk-set-uri: ${PRD_KEYCLOAK_JWK_SET_URI}
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false